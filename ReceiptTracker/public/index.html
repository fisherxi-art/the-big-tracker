<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receipt Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 data-i18n="title">Home Finance</h1>
        <button id="lang-toggle">繁 / EN</button>
    </header>

    <main class="container">
        <section class="card upload-section">
            <label for="receipt-upload" class="upload-btn">
                <span class="icon">📷</span>
                <span data-i18n="upload_btn">Snap / Upload Receipt(s)</span>
            </label>
            <input type="file" id="receipt-upload" accept="image/*" capture="environment" multiple style="display: none;">
            <div id="loading" class="hidden" data-i18n="analyzing">Analyzing…</div>
        </section>

        <div id="receipt-jobs"></div>

        <section id="stats-section" class="card">
            <h2 data-i18n="stats_title">This Month</h2>
            <ul id="stats-list" class="stats-list"></ul>

            <h3 data-i18n="recent_title">Recent</h3>
            <ul id="recent-list" class="recent-list"></ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
