# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Paid web service + persistent disk: SQLite and uploads under /var/data survive deploys.
# Disk size can only be increased later (not decreased). Adjust sizeGB if needed.
#
# After the first deploy, set PUBLIC_URL to your service URL (https://<name>.onrender.com)
# so OpenRouter gets a correct HTTP-Referer.

services:
  - type: web
    name: the-big-tracker
    runtime: node
    region: oregon
    plan: starter
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # 22.16+ includes node:sqlite fix for "statement has been finalized" (GC + prepared statements).
      # npm scripts still pass --experimental-sqlite for older local Node 22.5–22.12.
      - key: NODE_VERSION
        value: "22.16.0"
      - key: DATABASE_PATH
        value: "/var/data/app.db"
      - key: DATA_DIR
        value: "/var/data"
      - key: OPENROUTER_API_KEY
        sync: false
      # Pin text model in production (dashboard value overrides if set). dotenv does not override OS env.
      - key: OPENROUTER_MODEL
        value: qwen/qwen3.5-flash-02-23
      - key: PUBLIC_URL
        sync: false
